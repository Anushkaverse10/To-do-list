<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Study Task Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-animation"></div>

<div class="container">
  <h1>📚 Task Tracker</h1>

  <div class="input-section">
    <input type="text" id="taskInput" placeholder="Add your study task...">
    <button onclick="addTask()">+</button>
  </div>

  <div class="task-sections">

    <div class="tasks">
      <h2>Pending</h2>
      <div id="pendingList" class="task-grid"></div>
    </div>

    <div class="tasks">
      <h2>Completed</h2>
      <div id="completedList" class="task-grid"></div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
